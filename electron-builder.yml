appId: com.mindseye.taskfish
productName: TaskFish
directories:
  output: dist_electron
  buildResources: build
files:
  - dist/**/*
  - out/**/*
  - package.json
extraResources:
  - from: resources/bin
    to: bin
electronFuses:
  enableEmbeddedAsarIntegrityValidation: false
  onlyLoadAppFromAsar: false

win:
  target: nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: TaskFish
  createDesktopShortcut: true
  runAfterFinish: true
